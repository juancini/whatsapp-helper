<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Respuestas Rápidas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-mark">⚡</span>
    <div>
      <h1>Respuestas Rápidas</h1>
      <p class="tagline">Tocá un botón, elige una variación distinta cada vez, se copia sola.</p>
    </div>
  </div>

  <div class="topbar-actions">
    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="Buscar respuesta… (ej: horario, sofá, pago)" autocomplete="off">
    </div>
    <button id="historyBtn" class="btn btn-ghost">Historial</button>
    <button id="manageBtn" class="btn btn-ghost">Gestionar</button>
  </div>
</header>

<main id="mainView" class="grid" aria-live="polite"></main>

<!-- Empty state -->
<div id="emptyState" class="empty-state hidden">
  <p>Todavía no armaste ninguna respuesta.</p>
  <button id="emptyAddBtn" class="btn btn-primary">Crear la primera</button>
</div>

<!-- Manage mode panel -->
<section id="manageView" class="manage-view hidden">
  <div class="manage-header">
    <h2>Gestionar respuestas</h2>
    <button id="closeManageBtn" class="btn btn-ghost">Volver</button>
  </div>

  <div class="new-category-form">
    <input id="newCatName" type="text" placeholder="Nombre del botón (ej: Promo Sofá)">
    <input type="color" id="newCatColor" value="#1F6F63" title="Color">
    <button id="addCategoryBtn" class="btn btn-primary">+ Agregar botón</button>
  </div>

  <div id="manageList" class="manage-list"></div>
</section>

<!-- History panel -->
<section id="historyView" class="history-view hidden">
  <div class="manage-header">
    <h2>Historial de mensajes enviados</h2>
    <div>
      <button id="clearHistoryBtn" class="btn btn-ghost">Borrar historial</button>
      <button id="closeHistoryBtn" class="btn btn-ghost">Volver</button>
    </div>
  </div>
  <div id="historyList" class="history-list"></div>
</section>

<!-- Quick Edit Modal -->
<div id="quickEditModal" class="modal-overlay hidden">
  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-title-wrap">
        <input id="editModalCatName" type="text" placeholder="Nombre del botón" class="modal-title-input">
        <input id="editModalCatColor" type="color" title="Color del botón" class="modal-color-input">
      </div>
      <button id="closeEditModalBtn" class="btn btn-ghost btn-small">✕ Cerrar</button>
    </div>

    <div class="modal-body">
      <h3 class="modal-section-title">Variaciones de respuesta</h3>
      <div id="editModalVariationsList" class="modal-variations-list"></div>

      <div class="modal-add-variation">
        <textarea id="editModalNewVarText" placeholder="Escribí una nueva variación aquí..."></textarea>
        <button id="editModalAddVarBtn" class="btn btn-primary">+ Agregar variante</button>
      </div>
    </div>

    <div class="modal-footer">
      <button id="editModalDeleteCatBtn" class="btn btn-danger btn-small">Eliminar este botón</button>
      <button id="editModalDoneBtn" class="btn btn-primary">Listo</button>
    </div>
  </div>
</div>

<!-- Global floating toast notification -->
<div id="globalToast" class="global-toast hidden">
  <div class="toast-content">
    <span class="toast-badge">✓ Copiado</span>
    <span id="toastText" class="toast-text"></span>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
